<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SeeYou — Real-Time 3D Surveillance Globe</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="SeeYou Documentation — Real-time 3D surveillance globe built with CesiumJS, React, TypeScript, and Rust">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #34d399;
      --base-background-color: #0a0a0a;
      --cover-background-color: #0a0a0a;
      --sidebar-background: #111111;
      --sidebar-border-color: #1e1e1e;
      --sidebar-nav-link-color--active: #34d399;
      --sidebar-nav-link-border-color--active: #34d399;
      --heading-color: #f0fdf4;
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --code-font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      --code-block-border-radius: 8px;
      --code-inline-background: #1a1a2e;
      --code-inline-color: #34d399;
      --blockquote-border-color: #34d399;
      --table-row-odd-background: #111111;
      --link-color: #34d399;
      --link-color--hover: #6ee7b7;
    }

    .cover-main { max-width: 720px; }
    .cover-main h1 { font-weight: 800; letter-spacing: -0.02em; }
    .cover-main p:last-of-type a {
      border-radius: 8px !important;
      padding: 10px 32px !important;
      font-weight: 600 !important;
    }

    .markdown-section h1 { border-bottom: 2px solid #1e1e1e; padding-bottom: 12px; }
    .markdown-section h2 { color: #34d399; }
    .markdown-section table { font-size: 0.9em; }
    .markdown-section table th { background: #1a1a2e; color: #34d399; }

    .sidebar-nav li.active > a { font-weight: 700; }

    .app-name-link img { border-radius: 8px; }

    @media (max-width: 768px) {
      .markdown-section { padding: 16px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🌍 SeeYou',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        paths: 'auto',
        depth: 4,
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!',
      },
      tabs: { persist: true },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-glsl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
</body>
</html>
